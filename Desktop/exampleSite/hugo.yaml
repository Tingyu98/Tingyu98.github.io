  # About
  about:
    enable: true
    title: "About Me"
    image: "/images/about.png"
    content: |-
      I'm a data scientist with a background that started in chemistry labs and ended up in machine learning.

      Before my Master's in Data Science, I spent five years as a Chemistry Data Analyst in the food testing industry. I worked with large-scale laboratory datasets, built compliance dashboards, and helped inform food import decisions with data. One of the parts I valued most was translating technical findings into something clients could actually act on.

      That experience made me realize how much I loved the analytical side of the work, so I went back to school to go deeper. During my Master's, I partnered with a local nonprofit to overhaul their data workflows, build machine learning models, and create dashboards that shaped their strategic planning.
      
      What I enjoy most is digging into raw data, uncovering what it's really saying, and using that to help people make better decisions.
    
    skills:
      enable: false
      title: "Here are a few technologies I've been working with recently:"
      items:
