              * Identified four member segments using PCA and K-means clustering, uncovering behavioral patterns that informed targeted engagement and retention strategies.
              
              *  Built Power BI dashboards to analyze 10-year growth trends, uncovering a 20% participation gap among young adults that informed new outreach initiatives targeting this segment. 


